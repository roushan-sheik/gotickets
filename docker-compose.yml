services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gotickets_app
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    env_file:
      - .env
    # Allows the container to reach the host machine's PostgreSQL via 'host.docker.internal'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - gotickets_network

networks:
  gotickets_network:
    driver: bridge
