services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gotickets_app
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gotickets_network

  db:
    image: postgres:16-alpine
    container_name: gotickets_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gotickets}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - gotickets_network

volumes:
  postgres_data:
    driver: local

networks:
  gotickets_network:
    driver: bridge
